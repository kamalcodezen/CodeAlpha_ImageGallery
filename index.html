<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <!-- Header Section -->
    <header>
        <div class="container">
            <h2>Explore Gallery</h2>
            <p>Discover a curated collection of beautiful moments, modern architecture, and nature.</p>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <section class="gallery">
            <div class="container">
                <!-- Gallery Grid Container -->
                <div class="gallery-grid">

                    <!-- Gallery Item 1 -->
                    <div class="gallery-item">
                        <figure>
                            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80"
                                alt="Mountain Landscape">
                            <figcaption>
                                <h3>Serene Mountains</h3>
                                <p>Nature & Landscape</p>
                            </figcaption>
                        </figure>
                    </div>

                    <!-- Gallery Item 2 -->
                    <div class="gallery-item">
                        <figure>
                            <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=800&q=80"
                                alt="Foggy Forest">
                            <figcaption>
                                <h3>Misty Forest</h3>
                                <p>Wilderness</p>
                            </figcaption>
                        </figure>
                    </div>

                    <!-- Gallery Item 3 -->
                    <div class="gallery-item">
                        <figure>
                            <img src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?auto=format&fit=crop&w=800&q=80"
                                alt="Autumn Forest">
                            <figcaption>
                                <h3>Autumn Vibes</h3>
                                <p>Seasonal View</p>
                            </figcaption>
                        </figure>
                    </div>

                    <!-- Gallery Item 4 -->
                    <div class="gallery-item">
                        <figure>
                            <img src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?auto=format&fit=crop&w=800&q=80"
                                alt="Green Valley">
                            <figcaption>
                                <h3>Green Valley</h3>
                                <p>Outdoor Adventure</p>
                            </figcaption>
                        </figure>
                    </div>

                    <!-- Gallery Item 5 -->
                    <div class="gallery-item">
                        <figure>
                            <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=800&q=80"
                                alt="Ocean Coast">
                            <figcaption>
                                <h3>Coastal Cliff</h3>
                                <p>Seascape</p>
                            </figcaption>
                        </figure>
                    </div>

                    <!-- Gallery Item 6 -->
                    <div class="gallery-item">
                        <figure>
                            <img src="https://images.unsplash.com/photo-1518837695005-2083093ee35b?auto=format&fit=crop&w=800&q=80"
                                alt="Calm Lake">
                            <figcaption>
                                <h3>Reflective Lake</h3>
                                <p>Tranquility</p>
                            </figcaption>
                        </figure>
                    </div>

                </div>

                <!-- Lightbox Modal Container -->
                <div class="lightbox">
                    <button class="close-btn" aria-label="Close Lightbox">&times;</button>
                    <button class="prev-btn" aria-label="Previous Image">&#10094;</button>
                    <img class="lightbox-image" src="" alt="Preview Image">
                    <button class="next-btn" aria-label="Next Image">&#10095;</button>
                </div>

            </div>
        </section>
    </main>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2026 Image Gallery. All rights reserved.</p>
    </footer>

    <!-- JavaScript File -->
    <script src="./js/script.js"></script>
</body>

</html>
